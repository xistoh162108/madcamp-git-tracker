name: Snapshot Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.25.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: |
          if [ -n "$ORG_GITHUB_TOKEN" ]; then
            GITHUB_TOKEN="$ORG_GITHUB_TOKEN" pnpm sync:github
          else
            pnpm snapshot:sample
          fi
        env:
          ORG_GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
      - name: Commit updated snapshot
        if: env.ORG_GITHUB_TOKEN != ''
        env:
          ORG_GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/snapshots data/commits data/sync-reports
          git diff --cached --quiet || git commit -m "chore: sync GitHub activity snapshot [skip ci]"
          git push
